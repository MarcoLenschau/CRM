name: Generate & Upload CRM Documentation

on:
  push:
    branches:
      - main
      - master
      - feauture/create-main-stucture
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install TypeDoc Markdown Plugin
        run: npm install --save-dev typedoc typedoc-plugin-markdown

      - name: Generate TypeDoc documentation (HTML)
        run: npx typedoc --treatWarningsAsErrors false

      - name: Generate TypeDoc documentation (Markdown)
        run: npx typedoc --options typedoc-markdown.json --treatWarningsAsErrors false

      - name: Create ZIP archive
        run: |
          cd docs/typedoc-md
          zip -r ../../CRM-Documentation-V.0.1.0.zip .
          cd ../../

      - name: Get commit hash
        id: commit
        run: echo "HASH=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Upload to artefakte
        uses: actions/upload-artifact@v4
        with:
          name: CRM-Documentation-V.0.1.0
          path: CRM-Documentation-V.0.1.0.zip

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: './docs/typedoc'
          cname: false
