name: Build & Upload CRM Desktop App

on:
  push:
    branches:
      - main
      - master
      - feauture/create-main-stucture
      - feauture/automatical-electon-build
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux-app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd electron
          npm install

      - name: Build Electron app
        run: |
          cd electron
          npm run build:linux

      - name: Copy artifacts to root
        run: |
          cp electron/dist/*.deb . || true
          cp electron/dist/*.rpm . || true

      - name: Get commit hash
        id: commit
        run: echo "HASH=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CRM-Desktop-App-${{ steps.commit.outputs.HASH }}
          path: |
            *.deb
            *.rpm
          if-no-files-found: warn