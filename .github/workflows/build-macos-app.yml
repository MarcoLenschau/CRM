name: Build & Release CRM Desktop App (macOS)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd electron
          npm install

      - name: Build Electron app (macOS)
        run: |
          cd electron
          npm run build:mac

      - name: Get version from package.json
        id: version
        run: |
          $packageJson = Get-Content 'electron/package.json' -Raw | ConvertFrom-Json
          $VERSION = $packageJson.version
          $COMMIT_HASH = git rev-parse --short HEAD
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "COMMIT_HASH=$COMMIT_HASH" >> $GITHUB_OUTPUT
          echo "RELEASE_TAG=v$VERSION-$COMMIT_HASH" >> $GITHUB_OUTPUT
        shell: pwsh
          
      - name: Upload macOS assets with scp
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SCP_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "electron/dist/*.dmg,electron/dist/*.zip"
          target: ${{ secrets.SCP_TARGET_PATH }}
          strip_components: 2
          overwrite: true   
