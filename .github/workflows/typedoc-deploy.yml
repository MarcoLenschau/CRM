name: Deploy TypeDoc to GitHub Pages

on:
  push:
    branches:
      - main
      - master
      - feauture/create-main-stucture
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate TypeDoc documentation (HTML)
        run: npx typedoc --treatWarningsAsErrors false

      - name: Generate TypeDoc documentation (Markdown)
        run: npx typedoc -c typedoc-markdown.json --treatWarningsAsErrors false

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: './docs/typedoc'
          cname: false
