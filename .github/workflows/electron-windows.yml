name: Build & Release CRM Desktop App (Windows)

on:
  push:
    branches:
      - main
      - feature/automatical-electron-build
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd electron
          npm install
        shell: bash

      - name: Build Electron app (Windows)
        run: |
          cd electron
          npm run build:windows
        shell: bash

      - name: Get version from package.json
        id: version
        run: |
          FOR /F "tokens=2 delims=: " %%i IN ('findstr /R "version" electron\package.json ^| findstr /V "//"') DO SET VERSION=%%i
          SET VERSION=%VERSION:"=%
          SET VERSION=%VERSION:,=%
          FOR /F %%i IN ('git rev-parse --short HEAD') DO SET COMMIT_HASH=%%i
          SETLOCAL ENABLEDELAYEDEXPANSION
          echo VERSION=!VERSION! >> %GITHUB_OUTPUT%
          echo COMMIT_HASH=!COMMIT_HASH! >> %GITHUB_OUTPUT%
          echo RELEASE_TAG=v!VERSION!-!COMMIT_HASH! >> %GITHUB_OUTPUT%
        shell: cmd

      - name: List dist contents for debugging
        run: dir electron\dist\
        shell: cmd

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        with:
          draft: false
          prerelease: false
          release_name: CRM Desktop App v${{ steps.version.outputs.VERSION }}
          tag_name: ${{ steps.version.outputs.RELEASE_TAG }}
          body: |
            # CRM Desktop Application Release
            
            **Version:** ${{ steps.version.outputs.VERSION }}
            **Commit:** ${{ steps.version.outputs.COMMIT_HASH }}
            **Build Date:** ${{ github.event.head_commit.timestamp }}
            
            ## Download
            
            - [Windows Setup](https://github.com/MarcoLenschau/CRM/releases/latest/download/CRM-Desktop-${{ steps.version.outputs.VERSION }}-Setup.exe)
            - [Windows Portable](https://github.com/MarcoLenschau/CRM/releases/latest/download/CRM-Desktop-${{ steps.version.outputs.VERSION }}-Portable.exe)
            - [Linux DEB](https://github.com/MarcoLenschau/CRM/releases/latest/download/CRM-Desktop-${{ steps.version.outputs.VERSION }}-x64.deb)
            - [Linux RPM](https://github.com/MarcoLenschau/CRM/releases/latest/download/CRM-Desktop-${{ steps.version.outputs.VERSION }}-x64.rpm)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows Setup Installer
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./electron/dist/CRM Application Setup ${{ steps.version.outputs.VERSION }}.exe
          asset_name: CRM-Desktop-${{ steps.version.outputs.VERSION }}-Setup.exe
          asset_content_type: application/x-msdownload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows Portable EXE
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./electron/dist/CRM Application ${{ steps.version.outputs.VERSION }}.exe
          asset_name: CRM-Desktop-${{ steps.version.outputs.VERSION }}-Portable.exe
          asset_content_type: application/x-msdownload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
